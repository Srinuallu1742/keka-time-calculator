<!DOCTYPE html>
<html>
<head>

<title>Keka Time Calculator</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card{
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:fadeIn 1s ease;
}

textarea{
resize:none;
border-radius:10px;
}

button{
border-radius:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result-box{
background:#f8f9fa;
color:#333;
border-radius:12px;
padding:10px;
margin-top:10px;
animation:slideUp 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes slideUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div id="root"></div>

<script>

const { useState } = React;

function App(){

const [input,setInput] = useState("")
const [result,setResult] = useState(null)

function parseTime(t){
t = t.replace(/\s+/g,'')
let date = new Date("1970-01-01 " + t)
return date.getHours()*3600 +
date.getMinutes()*60 +
date.getSeconds()
}

function format(sec){
let h = Math.floor(sec/3600)
sec%=3600
let m = Math.floor(sec/60)
let s = sec%60

return h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")
}

function calculate(){

let text = input.replace(/\s*:\s*/g,":")

let matches = text.match(/\d{1,2}:\d{2}(:\d{2})?\s?(AM|PM|am|pm)?/g)

if(!matches){
alert("No valid timestamps")
return
}

let times = matches.map(t=>parseTime(t))

let work=0
let br=0

for(let i=0;i<times.length-1;i++){

if(i%2===0)
work += times[i+1]-times[i]
else
br += times[i+1]-times[i]

}

let required = 8*3600
let remaining = required - work
let last = times[times.length-1]
let expected = last + remaining

setResult({
work:format(work),
break:format(br),
expected:format(expected),
last:format(last)
})

}

return(

<div className="container">
<div className="card p-4 text-dark">

<h3 className="text-center mb-3">⏱ Keka Smart Calculator</h3>

<textarea
className="form-control"
rows="6"
placeholder="Paste Keka logs here..."
value={input}
onChange={(e)=>setInput(e.target.value)}
></textarea>

<button className="btn btn-primary w-100 mt-3" onClick={calculate}>
Calculate
</button>

{result && (
<div className="mt-3">

<div className="result-box">
<b>Worked Time:</b> {result.work}
</div>

<div className="result-box">
<b>Break Time:</b> {result.break}
</div>

<div className="result-box">
<b>Expected Logout:</b> {result.expected}
</div>

<div className="result-box">
<b>Last Recorded Time:</b> {result.last}
</div>

</div>
)}

</div>
</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />)

</script>

</body>
</html>
