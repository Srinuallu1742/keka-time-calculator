<!DOCTYPE html>
<html>
<head>

<title>Keka Time Calculator</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:40px;
}

textarea{
width:420px;
height:200px;
font-size:15px;
}

button{
padding:10px 20px;
margin-top:15px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:15px;
font-size:20px;
}

</style>

</head>

<body>

<h2>Keka Work Calculator</h2>

<p>Paste your activity logs below</p>

<textarea id="input"></textarea><br>

<button onclick="calculate()">Calculate</button>

<div class="result" id="worked"></div>
<div class="result" id="break"></div>
<div class="result" id="expected"></div>
<div class="result" id="actual"></div>

<script>

function parseTime(t){

t = t.replace(/\s+/g,'')

let date = new Date("1970-01-01 " + t)

return date.getHours()*3600 +
date.getMinutes()*60 +
date.getSeconds()

}

function format(sec){

let h = Math.floor(sec/3600)
sec%=3600

let m = Math.floor(sec/60)
let s = sec%60

return h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

}

function calculate(){

let text = document.getElementById("input").value

// remove extra spaces
text = text.replace(/\s*:\s*/g,":")

// find timestamps
let matches = text.match(/\b\d{1,2}:\d{2}(:\d{2})?\s?(AM|PM|am|pm)?\b/g)

if(!matches){
alert("No valid timestamps found")
return
}

let times = matches.map(t => parseTime(t))

let work=0
let br=0

for(let i=0;i<times.length-1;i++){

if(i%2==0)
work += times[i+1]-times[i]
else
br += times[i+1]-times[i]

}

let required = 8*3600

let remaining = required-work

let last = times[times.length-1]

let expectedLogout = last + remaining

document.getElementById("worked").innerHTML =
"Worked Time: "+format(work)

document.getElementById("break").innerHTML =
"Break Time: "+format(br)

document.getElementById("expected").innerHTML =
"Expected Logout: "+format(expectedLogout)

document.getElementById("actual").innerHTML =
"Last Recorded Time: "+format(last)

}

</script>

</body>
</html>
