<!DOCTYPE html>
<html>
<head>

<title>Keka Smart Calculator</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:100%;
max-width:500px;
animation:fadeIn 0.8s ease;
}

textarea{
resize:none;
border-radius:10px;
}

button{
border-radius:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result-box{
background:#f8f9fa;
border-radius:12px;
padding:10px;
margin-top:10px;
font-weight:500;
animation:slideUp 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes slideUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">
<div class="card p-4">

<h3 class="text-center mb-3">⏱ Keka Smart Calculator</h3>

<textarea id="input" class="form-control" rows="6"
placeholder="Paste Keka logs here..."></textarea>

<button class="btn btn-primary w-100 mt-3" onclick="calculate()">
Calculate
</button>

<div id="worked" class="result-box"></div>
<div id="break" class="result-box"></div>
<div id="expected" class="result-box"></div>
<div id="actual" class="result-box"></div>

</div>
</div>

<script>

function parseTime(t){

t = t.replace(/\s+/g,'')

let date = new Date("1970-01-01 " + t)

return date.getHours()*3600 +
date.getMinutes()*60 +
date.getSeconds()

}

function format(sec){

let h = Math.floor(sec/3600)
sec%=3600

let m = Math.floor(sec/60)
let s = sec%60

return h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

}

function calculate(){

let text = document.getElementById("input").value

// fix spaces like 09: 02: 19 → 09:02:19
text = text.replace(/\s*:\s*/g,":")

// extract times (with or without AM/PM)
let matches = text.match(/\d{1,2}:\d{2}(:\d{2})?\s?(AM|PM|am|pm)?/g)

if(!matches){
alert("No valid timestamps found")
return
}

let times = matches.map(t=>parseTime(t))

let work=0
let br=0

for(let i=0;i<times.length-1;i++){

if(i%2===0)
work += times[i+1]-times[i]
else
br += times[i+1]-times[i]

}

let required = 8*3600
let remaining = required - work
let last = times[times.length-1]
let expected = last + remaining

document.getElementById("worked").innerHTML =
"Worked Time: " + format(work)

document.getElementById("break").innerHTML =
"Break Time: " + format(br)

document.getElementById("expected").innerHTML =
"Expected Logout: " + format(expected)

document.getElementById("actual").innerHTML =
"Last Recorded Time: " + format(last)

}

</script>

</body>
</html>
