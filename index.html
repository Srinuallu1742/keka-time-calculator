<!DOCTYPE html>
<html>
<head>

<title>Keka Smart Calculator</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:100%;
max-width:500px;
animation:fadeIn 0.8s ease;
}

textarea{
resize:none;
border-radius:10px;
}

button{
border-radius:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result-box{
background:#f8f9fa;
border-radius:12px;
padding:10px;
margin-top:10px;
font-weight:500;
animation:slideUp 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes slideUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">
<div class="card p-4">

<h3 class="text-center mb-3">⏱ Keka Smart Calculator</h3>

<textarea id="input" class="form-control" rows="6"
placeholder="Paste Keka logs here..."></textarea>

<button class="btn btn-primary w-100 mt-3" onclick="calculate()">
Calculate
</button>

<div id="worked" class="result-box"></div>
<div id="break" class="result-box"></div>
<div id="expected" class="result-box"></div>
<div id="actual" class="result-box"></div>

</div>
</div>

<script>

function parseTime(t){

// remove spaces like 09: 05: 12 AM → 09:05:12AM
t = t.replace(/\s+/g,'').toUpperCase()

let match = t.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?(AM|PM)?$/)

if(!match) return null

let h = parseInt(match[1])
let m = parseInt(match[2])
let s = match[3] ? parseInt(match[3]) : 0
let period = match[4]

// convert 12hr → 24hr
if(period){
if(period === "PM" && h !== 12) h += 12
if(period === "AM" && h === 12) h = 0
}

// validate
if(h > 23 || m > 59 || s > 59) return null

return h*3600 + m*60 + s
}

function format(sec){

if(sec == null || isNaN(sec)) return "00:00:00"

let h = Math.floor(sec/3600)
sec%=3600

let m = Math.floor(sec/60)
let s = sec%60

return h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")
}

function calculate(){

let text = document.getElementById("input").value

// fix spacing like 09: 05: 12 → 09:05:12
text = text.replace(/\s*:\s*/g,":")

// extract timestamps
let matches = text.match(/\d{1,2}:\d{2}(:\d{2})?\s?(AM|PM|am|pm)?/g)

if(!matches){
alert("No valid timestamps found")
return
}

// convert and FILTER invalid ones
let times = matches.map(t => parseTime(t)).filter(t => t !== null)

if(times.length < 2){
alert("Not enough valid timestamps")
return
}

let work = 0
let br = 0

for(let i=0;i<times.length-1;i++){

let diff = times[i+1] - times[i]

// ignore negative values (bad data)
if(diff < 0) continue

if(i % 2 === 0)
work += diff
else
br += diff

}

let required = 8 * 3600
let remaining = required - work

if(remaining < 0) remaining = 0

let last = times[times.length-1]
let expected = last + remaining

document.getElementById("worked").innerHTML =
"Worked Time: " + format(work)

document.getElementById("break").innerHTML =
"Break Time: " + format(br)

document.getElementById("expected").innerHTML =
"Expected Logout: " + format(expected)

document.getElementById("actual").innerHTML =
"Last Recorded Time: " + format(last)

}

</script>
</body>
</html>
